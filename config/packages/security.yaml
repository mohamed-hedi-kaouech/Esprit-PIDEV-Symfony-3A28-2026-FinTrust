security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\AppAuthenticator
            logout:
                path: app_logout
                invalidate_session: true
                target: app_login

    access_control:
        # Routes publiques
        - { path: ^/$,                 roles: PUBLIC_ACCESS }
        - { path: ^/login,             roles: PUBLIC_ACCESS }
        - { path: ^/register,          roles: PUBLIC_ACCESS }
        - { path: ^/verification-compte, roles: PUBLIC_ACCESS }
        - { path: ^/mot-de-passe-oublie, roles: PUBLIC_ACCESS }
        - { path: ^/admin$,            roles: PUBLIC_ACCESS }
        - { path: ^/espace-client/qr/, roles: PUBLIC_ACCESS }
        # Catégories et Items - pas de restriction pour développement
        - { path: ^/admin/(categorie|item), roles: PUBLIC_ACCESS }
        - { path: ^/admin/alerte,           roles: PUBLIC_ACCESS }
        # Admin — accès restreint ROLE_ADMIN
        - { path: ^/admin,             roles: ROLE_ADMIN }
        # Client — accès restreint ROLE_CLIENT (garde KYC dans les contrôleurs)
        - { path: ^/espace-client,     roles: ROLE_CLIENT }

    role_hierarchy:
        ROLE_ADMIN: [ROLE_CLIENT, ROLE_USER]
        ROLE_CLIENT: ROLE_USER

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10

framework:
    validation:
        email_validation_mode: html5

        # Désactive la vérification HaveIBeenPwned en production aussi
        # (appel HTTP externe → timeout en environnement sans accès internet)
        not_compromised_password: false

        # Enables validator auto-mapping support.
        #auto_mapping:
        #    App\Entity\: []

when@test:
    framework:
        validation:
            not_compromised_password: false

when@dev:
    framework:
        validation:
            not_compromised_password: false
